<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Tracking System</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #059669;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --input-border: #cbd5e1;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px; 
            min-height: 100vh;
            margin: 0;
        }

        .container { 
            background: var(--card-bg); 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); 
            width: 100%; 
            max-width: 450px; 
            border-top: 6px solid var(--primary);
            transition: border-color 0.3s ease;
        }

        h2 { text-align: center; color: var(--text-main); margin-bottom: 1.5rem; font-weight: 800; }

        .tabs { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 25px; 
            background: #f1f5f9;
            padding: 5px;
            border-radius: 10px;
        }

        .tab-btn { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            background: transparent; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: 600; 
            color: var(--text-muted);
        }

        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        form { display: none; flex-direction: column; gap: 18px; }
        form.active { display: flex; }

        label { font-weight: 600; font-size: 0.85rem; color: var(--text-main); }

        input, select { 
            padding: 12px; 
            border: 2px solid var(--input-border); 
            border-radius: 8px; 
            font-size: 1rem; 
            outline: none;
        }

        button[type="submit"] { 
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
        }

        #register-form button { background-color: var(--primary); }
        #attendance-form button { background-color: var(--success); }

        .footer-note { 
            font-size: 0.75rem; 
            text-align: center; 
            margin-top: 25px; 
            color: var(--text-muted); 
            line-height: 1.5;
        }
        
        #message { display: none; text-align: center; font-weight: 600; margin-bottom: 20px; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <h2>Classroom Portal</h2>
    
    <div id="message"></div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-att" onclick="showForm('attendance', event)">Attendance</button>
        <button class="tab-btn" id="tab-reg" onclick="showForm('register', event)">Register</button>
    </div>

    <form id="attendance-form" class="active">
        <label for="att-name">Student Name</label>
        <select id="att-name" required>
            <option value="" disabled selected>Select from registered students...</option>
        </select>
        <label for="status">Status</label>
        <select id="status" required>
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
        </select>
        <button type="submit">Mark Attendance</button>
    </form>

    <form id="register-form">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe" required>
        <label for="reg-id">Student ID</label>
        <input type="text" id="reg-id" placeholder="e.g. ID-1001" required>
        <label for="reg-gender">Gender</label>
        <select id="reg-gender" required>
            <option value="" disabled selected>Choose Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <button type="submit">Complete Registration</button>
    </form>

    <p class="footer-note">
        Digital Tracking System v2.0<br>
        <strong>Designed by Mugonyi Edrine Dickson</strong>
    </p>
</div>

<script>
    const studentList = document.getElementById('att-name');
    const msgDiv = document.getElementById('message');
    const card = document.getElementById('main-card');

    function showForm(type, event) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('attendance-form').classList.remove('active');
        document.getElementById('register-form').classList.remove('active');
        document.getElementById(type + '-form').classList.add('active');
        card.style.borderColor = (type === 'attendance') ? 'var(--success)' : 'var(--primary)';
        msgDiv.style.display = 'none';
    }

    document.getElementById('register-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('reg-name').value;
        const id = document.getElementById('reg-id').value;
        const newOption = document.createElement('option');
        newOption.value = id;
        newOption.text = name;
        studentList.add(newOption);
        msgDiv.textContent = "Registration Successful!";
        msgDiv.style.display = 'block';
        msgDiv.style.color = "#065f46";
        msgDiv.style.background = "#ecfdf5";
        this.reset();
    });

    document.getElementById('attendance-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const selectedStudent = studentList.options[studentList.selectedIndex].text;
        const status = document.getElementById('status').value;
        msgDiv.textContent = selectedStudent + " marked " + status;
        msgDiv.style.display = 'block';
        msgDiv.style.color = "#1e40af"; 
        msgDiv.style.background = "#eff6ff";
    });
</script>

</body>
  </html>
